<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FEB Composites — Work Orders</title>
<style>
  :root {
    --blue: #003262; --gold: #FDB515; --bg: #f6f7f9; --card: #fff;
    --line: #d7dbe0; --text: #1c2733; --muted: #5c6b7a; --bad: #b3261e; --ok: #1e7d32;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.45 -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header.app { background: var(--blue); color: #fff; padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  header.app h1 { font-size: 16px; margin: 0 auto 0 0; font-weight: 700; }
  header.app h1 span { color: var(--gold); }
  button { font: inherit; border: 1px solid var(--line); border-radius: 6px; background: #fff; padding: 5px 10px; cursor: pointer; }
  button.primary { background: var(--gold); border-color: var(--gold); color: #1c2733; font-weight: 600; }
  button.ghost { background: transparent; border-color: rgba(255,255,255,.5); color: #fff; }
  button.danger { color: var(--bad); }
  main { max-width: 1080px; margin: 0 auto; padding: 14px 16px 60px; }
  .filters { display: flex; gap: 8px; margin: 6px 0 12px; flex-wrap: wrap; }
  .filters select, .filters input { font: inherit; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; }
  table.list { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  table.list th { background: var(--blue); color: #fff; text-align: left; padding: 7px 9px; font-size: 12.5px; }
  table.list td { padding: 7px 9px; border-top: 1px solid var(--line); cursor: pointer; }
  table.list tr:hover td { background: #eef3f9; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 12px; border: 1px solid var(--line); background: #fff; }
  .pill.Complete { background: #e6f2e8; border-color: #bcd9c2; color: var(--ok); }
  .pill.InWork { background: #fff6df; border-color: #f0d990; }
  .pill.Draft { background: #eee; }
  .pill.OnHold { background: #fdecea; border-color: #f2c1bd; color: var(--bad); }
  .pill.retro { background: #eef; border-color: #ccd; color: #446; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; margin: 0 0 12px; }
  .card h2 { margin: 0 0 4px; font-size: 18px; color: var(--blue); }
  .card h3 { margin: 14px 0 6px; font-size: 13.5px; color: var(--blue); text-transform: uppercase; letter-spacing: .04em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 6px 14px; }
  .grid .f label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .grid .f input, .grid .f select { width: 100%; font: inherit; padding: 4px 6px; border: 1px solid var(--line); border-radius: 5px; }
  .grid .f .ro { padding: 4px 0; min-height: 1.4em; }
  table.sub { width: 100%; border-collapse: collapse; margin: 4px 0; font-size: 13px; }
  table.sub th { text-align: left; background: #eef1f5; padding: 4px 7px; font-size: 11.5px; }
  table.sub td { padding: 4px 7px; border-top: 1px solid var(--line); vertical-align: top; }
  table.sub input { width: 100%; font: inherit; border: 1px solid var(--line); border-radius: 4px; padding: 2px 5px; }
  .stackviz { margin: 8px 0; }
  .stackviz .plybar { border: 1px solid var(--line); border-bottom: none; padding: 3px 10px; font-size: 12px; }
  .stackviz .plybar:last-child { border-bottom: 1px solid var(--line); }
  .plybar.cf { background: #3b4653; color: #fff; }
  .plybar.spread { background: #6b7684; color: #fff; }
  .plybar.core { background: var(--gold); }
  .plybar.mesh { background: #c98f4a; color: #fff; }
  .plybar.other { background: #dfe4ea; }
  .step { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-top: 1px solid var(--line); }
  .step:first-of-type { border-top: none; }
  .step .num { font-weight: 700; color: var(--blue); min-width: 22px; }
  .step .body { flex: 1; }
  .step .meta { font-size: 12px; color: var(--muted); }
  .step .buyoff { display: flex; gap: 6px; align-items: center; font-size: 12px; }
  .step .buyoff input { width: 70px; font: inherit; border: 1px solid var(--line); border-radius: 4px; padding: 2px 5px; }
  .step.gate { background: #fffbea; margin: 0 -8px; padding-left: 8px; padding-right: 8px; }
  .step.done { opacity: .75; }
  .step.failed { background: #fdecea; margin: 0 -8px; padding-left: 8px; padding-right: 8px; }
  .ok { color: var(--ok); font-weight: 600; }
  .warn { color: var(--bad); font-weight: 600; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .muted { color: var(--muted); }
  .sig { margin-top: 26px; display: none; }
  .sig .line { display: inline-block; width: 260px; border-bottom: 1px solid #000; margin: 0 30px 4px 0; }
  textarea { width: 100%; font: inherit; border: 1px solid var(--line); border-radius: 5px; padding: 5px; min-height: 40px; }
  @media print {
    @page { size: letter; margin: 0.55in; }
    header.app, .filters, .toolbar, button, .no-print { display: none !important; }
    body { background: #fff; font-size: 11.5px; }
    main { max-width: none; padding: 0; }
    .card { border: 1px solid #000; border-radius: 0; break-inside: auto; margin-bottom: 8px; padding: 10px 14px; }
    .card h2 { break-after: avoid; }
    .card h3 { break-after: avoid; margin-top: 12px; }
    .grid, .stackviz, .sig { break-inside: avoid; }
    table.sub { break-inside: auto; }
    table.sub thead { display: table-header-group; }
    table.sub tr { break-inside: avoid; }
    table.sub th { background: #ddd !important; -webkit-print-color-adjust: exact; }
    .plybar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .step { break-inside: avoid; }
    .step .buyoff input, .step .buyoff button { display: none; }
    .sig { display: block; }
    a { color: #000; text-decoration: none; }
  }
</style>
</head>
<body>
<header class="app">
  <h1>FEB <span>Composites</span> — Work Orders</h1>
  <button class="ghost" onclick="newWO()">+ New Work Order</button>
  <button class="ghost" onclick="exportJSON()">Export JSON</button>
  <button class="ghost" onclick="document.getElementById('importfile').click()">Import JSON</button>
  <input type="file" id="importfile" accept=".json" style="display:none" onchange="importJSON(this)">
  <button class="ghost" onclick="loadSeed()">Load SN5 archive</button>
  <span style="flex-basis:100%;font-size:11.5px;color:#ffd97a">⚠ Offline copy — the team now runs the hosted multi-user app (see app/README.md for the URL). This version keeps working forever as the backup/archive viewer, but its browser storage is a cache, not a record: Export JSON after any real use (CS-013 §7.4).</span>
</header>

    ["Dry stack + bag (CS-006 §7.2–7.3)", "CS-006"], ["Drop test ≤1 inHg/10 min (CS-006 §7.4)", "CS-006"],
    ["Infuse (CS-006 §7.5)", "CS-006"], ["Cure + demould (CS-006 §7.6)", "CS-006"],
    ["Cut to DXF — confirm rev (CS-009)", "CS-009"], ["Finish (CS-009)", "CS-009"]],
  MoldWetLay: [
    ["Stack frozen (CS-002 §7.2)", "CS-002"], ["Mold design review (CS-003 §7.2)", "CS-003"],
    ["Glue + machine mold (CS-003/005)", "CS-003"], ["Seal + release mold (CS-004)", "CS-004"],
    ["Wet layup + bag (CS-007)", "CS-007"], ["Cure + demould (CS-007)", "CS-007"],
    ["Trim + finish (CS-009)", "CS-009"]],
  FoamWrapped: [
    ["Stack frozen (CS-002 §7.2)", "CS-002"], ["Shape foam core (CS-003)", "CS-003"],
    ["Wet layup over core (CS-007 §7.6)", "CS-007"], ["Cure (CS-007)", "CS-007"],
    ["Trim + finish (CS-009)", "CS-009"]],
  Other: [["Define acceptance criterion (CS-010 §7.1 pattern: target + method BEFORE work)", "CS-010"],
          ["Execute", "CS-013"], ["Verify against criterion", "CS-013"]],
};

let DB = load();
let view = { mode: "list", id: null, edit: false, fStatus: "", fSub: "", q: "" };

function load() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch (e) { return []; }
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function byId(id) { return DB.find(w => w.id === id); }
function today() { return new Date().toISOString().slice(0, 10); }

function nextId() {
  let max = 0;
  DB.forEach(w => { const m = w.id.match(/^WO-SN6-(\d+)$/); if (m) max = Math.max(max, +m[1]); });
  return `WO-SN6-${String(max + 1).padStart(3, "0")}`;
}

function newWO() {
  const id = nextId();
  DB.push({
    id, partName: "", subteam: "AERO", revision: "A", status: "Draft",
    processType: "MoldInfusion", moldEngineer: "", manufacturingEngineer: "",
    createdDate: today(), dueDate: "", mold: { moldId: "", layers: "", density: "", sealingType: "XCR (CS-004)", location: "" },
    layupStack: [], stackNote: "", bom: [], standardsRefs: [],
    steps: STD_STEPS.MoldInfusion.map((s, i) => ({ seq: i + 1, title: s[0], csRef: s[1], status: "open", buyoff: { name: "", date: "" }, notes: "", photoRefs: [] })),
    qualityChecks: [{ criterion: "mass", target: "", actual: "", pass: null }],
    weightTargetG: null, weightActualG: null, timeline: [], notes: "", retro: false,
  });
  save(); view = { ...view, mode: "detail", id, edit: true }; render();
}

function resetSteps(wo) {
  if (!confirm("Replace steps with the standard list for " + wo.processType + "?")) return;
  wo.steps = (STD_STEPS[wo.processType] || STD_STEPS.Other).map((s, i) =>
    ({ seq: i + 1, title: s[0], csRef: s[1], status: "open", buyoff: { name: "", date: "" }, notes: "", photoRefs: [] }));
  save(); render();
}

function loadSeed() {
  let seed;
  try { seed = JSON.parse(document.getElementById("seed").textContent); } catch (e) { alert("No SN5 seed embedded in this copy."); return; }
  if (!Array.isArray(seed)) { alert("No SN5 seed embedded in this copy."); return; }
  let added = 0;
  seed.forEach(w => { if (!byId(w.id)) { DB.push(w); added++; } });
  save(); render();
  alert(added + " SN5 work orders loaded (" + (seed.length - added) + " already present).");
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(DB, null, 1)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "feb-work-orders-" + today() + ".json";
  a.click(); URL.revokeObjectURL(a.href);
}

function importJSON(input) {
  const file = input.files[0]; if (!file) return;
  file.text().then(t => {
    try {
      const arr = JSON.parse(t);
      if (!Array.isArray(arr)) throw new Error("not an array");
      let added = 0, updated = 0;
      arr.forEach(w => {
        const i = DB.findIndex(x => x.id === w.id);
        if (i >= 0) { DB[i] = w; updated++; } else { DB.push(w); added++; }
      });
      save(); render();
      alert("Imported: " + added + " new, " + updated + " updated.");
    } catch (e) { alert("Import failed: " + e.message); }
  });
  input.value = "";
}

function delWO(id) {
  if (!confirm("Delete " + id + "? (Export first if unsure — this only affects this browser.)")) return;
  DB = DB.filter(w => w.id !== id); save();
  view = { ...view, mode: "list", id: null }; render();
}

function isBlocker(step) { const t = step.title.toLowerCase(); return BLOCKER_WORDS.some(g => t.includes(g)); }
function isSigned(s) { return !!(s.buyoff && s.buyoff.name && !/not recorded/i.test(s.buyoff.name)); }
function stepState(s) {
  const st = (s.status || "").toLowerCase();
  if (st.includes("fail") || st.includes("skip")) return "failed";
  if (isSigned(s) || st.startsWith("done")) return "done";
  return "open";
}
function blockerOpenBefore(wo, idx) {
  if (wo.retro) return null; // historical records: blockers are documentation, not enforcement
  for (let i = 0; i < idx; i++) {
    const s = wo.steps[i];
    if (isBlocker(s) && !isSigned(s)) return wo.steps[i];
  }
  return null;
}

function plyClass(m) {
  m = (m || "").toLowerCase();
  if (m.includes("spread")) return "spread";
  if (m.includes("mesh") || m.includes("copper")) return "mesh";
  if (m.includes("core") || m.includes("nomex") || m.includes("foam") || m.includes("rohacell") || m.includes("honeycomb")) return "core";
  if (m.includes("twill") || m.includes("carbon") || m.includes("cf") || /\b\d{2,3}\b/.test(m)) return "cf";
  return "other";
}

/* ---------- rendering ---------- */
function render() {
  const el = document.getElementById("main");
  el.innerHTML = view.mode === "list" ? renderList() : renderDetail();
}

function renderList() {
  const rows = DB
    .filter(w => (!view.fStatus || w.status === view.fStatus))
    .filter(w => (!view.fSub || w.subteam === view.fSub))
    .filter(w => { const q = view.q.toLowerCase(); return !q || w.id.toLowerCase().includes(q) || (w.partName || "").toLowerCase().includes(q); })
    .sort((a, b) => a.id.localeCompare(b.id));
  const subs = [...new Set(DB.map(w => w.subteam))].sort();
  return `
  <div class="filters no-print">
    <select onchange="view.fStatus=this.value;render()">
      <option value="">All statuses</option>
      ${STATUSES.map(s => `<option ${view.fStatus === s ? "selected" : ""}>${s}</option>`).join("")}
    </select>
    <select onchange="view.fSub=this.value;render()">
      <option value="">All subteams</option>
      ${subs.map(s => `<option ${view.fSub === s ? "selected" : ""}>${s}</option>`).join("")}
    </select>
    <input placeholder="search id / part…" value="${esc(view.q)}" oninput="view.q=this.value;render()">
    <span class="muted" style="align-self:center">${rows.length} of ${DB.length} work orders</span>
  </div>
  ${DB.length === 0 ? `<div class="card">No work orders yet. <b>New Work Order</b> to start, or <b>Load SN5 archive</b> for the retro records.</div>` : ""}
  <table class="list">
    <tr><th>ID</th><th>Part</th><th>Subteam</th><th>Process</th><th>ME / RE</th><th>Due</th><th>Status</th></tr>
    ${rows.map(w => `<tr onclick="view={...view,mode:'detail',id:'${w.id}',edit:false};render()">
      <td><b>${esc(w.id)}</b>${w.retro ? ' <span class="pill retro">retro</span>' : ""}</td>
      <td>${esc(w.partName)}</td><td>${esc(w.subteam)}</td><td>${esc(w.processType)}</td>
      <td>${esc(w.moldEngineer || "—")} / ${esc(w.manufacturingEngineer || "—")}</td>
      <td>${esc(w.dueDate || "")}</td><td><span class="pill ${esc(w.status)}">${esc(w.status)}</span></td>
    </tr>`).join("")}
  </table>`;
}

function fld(wo, label, key, type) {
  const v = wo[key] ?? "";
  if (!view.edit) return `<div class="f"><label>${label}</label><div class="ro">${esc(v) || "—"}</div></div>`;
  if (type === "select-status") return `<div class="f"><label>${label}</label><select onchange="upd('${key}',this.value)">${STATUSES.map(s => `<option ${v === s ? "selected" : ""}>${s}</option>`).join("")}</select></div>`;
  if (type === "select-process") return `<div class="f"><label>${label}</label><select onchange="upd('${key}',this.value)">${PROCESSES.map(s => `<option ${v === s ? "selected" : ""}>${s}</option>`).join("")}</select></div>`;
  return `<div class="f"><label>${label}</label><input value="${esc(v)}" onchange="upd('${key}',this.value)"></div>`;
}

function renderDetail() {
  const wo = byId(view.id);
  if (!wo) { view.mode = "list"; return renderList(); }
  const E = view.edit;
  const moldRows = wo.mold ? `
    <h3>Mold</h3><div class="grid">
      ${mf(wo, "Mold ID", "moldId")}${mf(wo, "Layers", "layers")}${mf(wo, "Density (lb/ft³)", "density")}
      ${mf(wo, "Sealing", "sealingType")}${mf(wo, "Location (live — update on every move)", "location")}
    </div>` : "";
  return `
  <div class="toolbar no-print">
    <button onclick="view={...view,mode:'list'};render()">← All work orders</button>
    <button class="primary" onclick="view.edit=!view.edit;render()">${E ? "Done editing" : "Edit"}</button>
    <button onclick="window.print()">Print</button>
    ${E ? `<button onclick="resetSteps(byId('${wo.id}'))">Reset steps to standard</button>
           <button class="danger" onclick="delWO('${wo.id}')">Delete</button>` : ""}
  </div>
  <div class="card">
    <h2>${esc(wo.id)} — ${esc(wo.partName || "(unnamed)")} ${wo.retro ? '<span class="pill retro">retro record</span>' : ""}</h2>
    <div class="muted">Rev ${esc(wo.revision)} · <span class="pill ${esc(wo.status)}">${esc(wo.status)}</span></div>
    <h3>Overview</h3>
    <div class="grid">
      ${fld(wo, "Part name", "partName")}${fld(wo, "Subteam", "subteam")}${fld(wo, "Status", "status", "select-status")}
      ${fld(wo, "Process", "processType", "select-process")}${fld(wo, "Mold Engineer", "moldEngineer")}
      ${fld(wo, "Manufacturing Engineer", "manufacturingEngineer")}${fld(wo, "Created", "createdDate")}${fld(wo, "Due", "dueDate")}
      ${fld(wo, "Revision", "revision")}${fld(wo, "Mass target (g)", "weightTargetG")}${fld(wo, "Mass actual (g)", "weightActualG")}
    </div>
    ${moldRows}
    <h3>Layup stack (CS-002) ${wo.stackNote ? `<span class="muted" style="text-transform:none">— ${esc(wo.stackNote)}</span>` : ""}</h3>
    <div class="stackviz">${(wo.layupStack || []).map((p, i) =>
      `<div class="plybar ${plyClass(p.material)}">P${i + 1} · ${esc(p.material)} · ${esc(p.orientation || "")} · ${esc(p.coverage || "")} ${p.notes ? "· " + esc(p.notes) : ""}</div>`).join("") || '<span class="muted">no plies recorded</span>'}
    </div>
    ${E ? `<button onclick="addPly('${wo.id}')">+ ply</button> <button onclick="popPly('${wo.id}')">− last ply</button>` : ""}
    <h3>BOM</h3>
    <table class="sub"><thead><tr><th>Item</th><th>Qty</th><th>Source</th><th>Est. cost</th></tr></thead><tbody>
      ${(wo.bom || []).map((b, i) => E
        ? `<tr><td><input value="${esc(b.item)}" onchange="ub(${i},'item',this.value)"></td><td><input value="${esc(b.qty)}" onchange="ub(${i},'qty',this.value)"></td><td><input value="${esc(b.source)}" onchange="ub(${i},'source',this.value)"></td><td><input value="${esc(b.estCost)}" onchange="ub(${i},'estCost',this.value)"></td></tr>`
        : `<tr><td>${esc(b.item)}</td><td>${esc(b.qty)}</td><td>${esc(b.source)}</td><td>${esc(b.estCost)}</td></tr>`).join("")}
    </tbody></table>
    ${E ? `<button onclick="byId('${wo.id}').bom.push({item:'',qty:'',unit:'',source:'',estCost:''});save();render()">+ BOM line</button>` : ""}
    <h3>Steps & buy-offs (blockers shaded — no initials, no moving on)</h3>
    ${(wo.steps || []).map((s, i) => {
      const blocker = isBlocker(s);
      const state = stepState(s);
      const blocked = blockerOpenBefore(wo, i);
      return `<div class="step ${blocker ? "gate" : ""} ${state === "done" ? "done" : ""} ${state === "failed" ? "failed" : ""}">
        <div class="num">${s.seq}</div>
        <div class="body">
          <div>${esc(s.title)} <span class="muted">[${esc(s.csRef || "")}]</span> ${blocker ? "<b>· BLOCKER</b>" : ""}</div>
          ${s.notes ? `<div class="meta">${esc(s.notes)}</div>` : ""}
          ${E ? `<div class="meta no-print"><input style="width:90%" placeholder="notes / photo filenames" value="${esc(s.notes)}" onchange="us(${i},'notes',this.value)"></div>` : ""}
          ${(s.photoRefs || []).length ? `<div class="meta">photos: ${s.photoRefs.map(p => esc(p.filename || p)).join(", ")}</div>` : ""}
        </div>
        <div class="buyoff">
          ${state === "failed"
            ? `<span class="warn">✗ ${esc(s.status)}</span>`
            : state === "done"
              ? (isSigned(s)
                ? `<span class="ok">✔ ${esc(s.buyoff.name)} ${esc(s.buyoff.date || "")}</span>`
                : `<span class="muted">done — buy-off not recorded (retro)</span>`)
              : (wo.retro ? `<span class="muted">${esc(s.status || "open")}</span>`
                : `<input placeholder="initials" id="bo-${i}"><button onclick="buyoff(${i})" ${blocked ? "disabled title='blocked by unfinished blocker: " + esc(blocked.title) + "'" : ""}>buy off</button>`)}
        </div>
      </div>`;
    }).join("")}
    <h3>Quality checks / acceptance criteria</h3>
    <table class="sub"><thead><tr><th>Criterion</th><th>Target (set at creation!)</th><th>Actual</th><th>Pass</th></tr></thead><tbody>
      ${(wo.qualityChecks || []).map((q, i) => E
        ? `<tr><td><input value="${esc(q.criterion)}" onchange="uq(${i},'criterion',this.value)"></td><td><input value="${esc(q.target)}" onchange="uq(${i},'target',this.value)"></td><td><input value="${esc(q.actual)}" onchange="uq(${i},'actual',this.value)"></td><td><select onchange="uq(${i},'pass',this.value==='true'?true:this.value==='false'?false:null)"><option ${q.pass == null ? "selected" : ""}>—</option><option value="true" ${q.pass === true ? "selected" : ""}>pass</option><option value="false" ${q.pass === false ? "selected" : ""}>FAIL</option></select></td></tr>`
        : `<tr><td>${esc(q.criterion)}</td><td>${esc(q.target)}</td><td>${esc(q.actual)}</td><td>${q.pass === true ? '<span class="ok">pass</span>' : q.pass === false ? '<span class="warn">FAIL</span>' : "—"}</td></tr>`).join("")}
    </tbody></table>
    ${E ? `<button onclick="byId('${wo.id}').qualityChecks.push({criterion:'',target:'',actual:'',pass:null});save();render()">+ check</button>` : ""}
    <h3>Timeline</h3>
    <table class="sub"><thead><tr><th style="width:110px">Date</th><th>Event</th></tr></thead><tbody>
      ${(wo.timeline || []).map((t, i) => E
        ? `<tr><td><input value="${esc(t.date)}" onchange="ut(${i},'date',this.value)"></td><td><input value="${esc(t.note)}" onchange="ut(${i},'note',this.value)"></td></tr>`
        : `<tr><td>${esc(t.date)}</td><td>${esc(t.note)}</td></tr>`).join("")}
    </tbody></table>
    ${E ? `<button onclick="byId('${wo.id}').timeline.push({date:'',note:''});save();render()">+ event</button>` : ""}
    <h3>Notes</h3>
    ${E ? `<textarea onchange="upd('notes',this.value)">${esc(wo.notes)}</textarea>` : `<div>${esc(wo.notes) || '<span class="muted">—</span>'}</div>`}
    <div class="sig">
      <h3>Release sign-off (print copy)</h3>
      <div><span class="line"></span><span class="line"></span></div>
      <div class="muted">Manufacturing Engineer · date &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Composites Lead / requesting subteam lead · date</div>
    </div>
  </div>`;
}

/* field update helpers (operate on current WO) */
function upd(key, val) { const w = byId(view.id); w[key] = val; save(); }
function mf(wo, label, key) {
  const v = (wo.mold || {})[key] ?? "";
  return view.edit
    ? `<div class="f"><label>${label}</label><input value="${esc(v)}" onchange="byId(view.id).mold['${key}']=this.value;save()"></div>`
    : `<div class="f"><label>${label}</label><div class="ro">${esc(v) || "—"}</div></div>`;
}
function ub(i, k, v) { byId(view.id).bom[i][k] = v; save(); }
function uq(i, k, v) { byId(view.id).qualityChecks[i][k] = v; save(); render(); }
function ut(i, k, v) { byId(view.id).timeline[i][k] = v; save(); }
function us(i, k, v) { byId(view.id).steps[i][k] = v; save(); }
function addPly(id) { byId(id).layupStack.push({ material: prompt("Ply material (e.g. 195 twill, Cu mesh, Rohacell 31 3mm):") || "", orientation: prompt("Orientation (0/90, ±45, n/a):") || "", coverage: "full", notes: "" }); save(); render(); }
function popPly(id) { byId(id).layupStack.pop(); save(); render(); }
function buyoff(i) {
  const w = byId(view.id);
  const inp = document.getElementById("bo-" + i);
  const name = (inp.value || "").trim();
  if (!name) { alert("Type your initials to buy off this step."); return; }
  const blocked = blockerOpenBefore(w, i);
  if (blocked) { alert("Blocked by unfinished blocker: " + blocked.title); return; }
  w.steps[i].buyoff = { name, date: today() };
  w.steps[i].status = "done";
  save(); render();
}

render();
</script>
</body>
